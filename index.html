<!DOCTYPE html>A
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Web App</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

:root{
--bg:#ffffff;
--text:#333;
--card:#f5f5f5;
--primary:#007bff;
}

.dark{
--bg:#121212;
--text:#ffffff;
--card:#1f1f1f;
}

body{
background:var(--bg);
color:var(--text);
transition:.3s;
}

header{
background:var(--primary);
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:24px;
font-weight:bold;
}

.controls{
display:flex;
gap:10px;
}

input{
padding:8px;
border:none;
border-radius:5px;
}

button{
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.cart{
background:white;
color:black;
font-weight:bold;
}

.theme{
background:black;
color:white;
}

.products{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:var(--card);
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin:10px 0;
}

.card p{
margin-bottom:10px;
}

.add-btn{
background:var(--primary);
color:white;
}

footer{
text-align:center;
padding:20px;
background:#222;
color:white;
margin-top:20px;
}

@media(max-width:768px){

header{
flex-direction:column;
gap:10px;
}

.controls{
flex-wrap:wrap;
justify-content:center;
}

.products{
padding:15px;
}
}
</style>
</head>

<body>

<header>
<div class="logo">ShopEasy</div>

<div class="controls">
<input type="text" id="search" placeholder="Search Products">
<button class="cart">
Cart: <span id="count">0</span>
</button>
<button class="theme" onclick="toggleTheme()">
🌙 Mode
</button>
</div>
</header>

<section class="products" id="productContainer">

<div class="card" data-name="Laptop">
<img loading="lazy"
src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500"
alt="Laptop">
<h3>Laptop</h3>
<p>$800</p>
<button class="add-btn">Add to Cart</button>
</div>

<div class="card" data-name="Phone">
<img loading="lazy"
src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500"
alt="Phone">
<h3>Phone</h3>
<p>$500</p>
<button class="add-btn">Add to Cart</button>
</div>

<div class="card" data-name="Headphones">
<img loading="lazy"
src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
alt="Headphones">
<h3>Headphones</h3>
<p>$100</p>
<button class="add-btn">Add to Cart</button>
</div>

<div class="card" data-name="Smart Watch">
<img loading="lazy"
src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=500"
alt="Watch">
<h3>Smart Watch</h3>
<p>$200</p>
<button class="add-btn">Add to Cart</button>
</div>

</section>

<footer>
<p>© 2026 ShopEasy E-Commerce Web App</p>
</footer>

<script>


let cartCount = 0;
const count = document.getElementById("count");

document.querySelectorAll(".add-btn")
.forEach(button => {
button.addEventListener("click", () => {
cartCount++;
count.textContent = cartCount;
});
});


document.getElementById("search")
.addEventListener("keyup", function(){

let value = this.value.toLowerCase();

document.querySelectorAll(".card")
.forEach(card => {

let name = card.dataset.name.toLowerCase();

if(name.includes(value)){
card.style.display="block";
}else{
card.style.display="none";
}

});
});

function toggleTheme(){
document.body.classList.toggle("dark");
}

window.addEventListener("load", () => {
console.log("Application Loaded Successfully");
});

</script>

</body>
</html>
